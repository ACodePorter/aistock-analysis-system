
version: "3.9"
services:
  db:
    image: postgres:16
    # 使用已有容器名 aistock-postgres-local 以避免重复创建新的 Postgres 实例
    container_name: aistock-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./initdb/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks: [aistock]

  api:
    build: ./backend
    container_name: aistock-api
    restart: unless-stopped
    env_file: .env
    depends_on: [db, keycloak, minio]
    ports:
      - "8080:8080"
    networks: [aistock]

  web:
    build: ./frontend
    container_name: aistock-web
    restart: unless-stopped
    depends_on: [api]
    environment:
      - VITE_API_BASE=http://api:8080
    ports:
      - "8081:80"
    networks: [aistock]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks: [aistock]

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    # 对外映射为 8099 以避免与后端 8080 端口冲突
    ports:
      - "8099:8080"
    networks: [aistock]

volumes:
  db_data:
  minio_data:

networks:
  aistock:
