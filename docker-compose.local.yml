version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: aistock-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aistock}
      POSTGRES_USER: ${POSTGRES_USER:-aistock_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aistock_pass}
      TZ: ${TZ:-UTC}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/initdb/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks: [local-services]

  redis:
    container_name: aistock-redis
    image: "redis:alpine"
    command: redis-server --save 30 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
    networks: [local-services]

  searxng:
    container_name: aistock-searxng
    build:
      context: ./infra/searxng
      dockerfile: Dockerfile
    image: aistock-searxng-custom:latest
    ports:
      - "10000:8080"
    volumes:
      - ./infra/searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:10000/
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
    networks: [local-services]
    depends_on:
      - redis

  mongodb:
    image: mongo:7
    container_name: aistock-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: aistock_news
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./infra/mongodb/init:/docker-entrypoint-initdb.d
    networks: [local-services]
    command: --noauth

  # RSSHub + browserless for RSS aggregation (shares existing redis)
  browserless:
    image: browserless/chrome:latest
    container_name: aistock-browserless
    restart: unless-stopped
    environment:
      - CONNECTION_TIMEOUT=60000
      - MAX_CONCURRENT_SESSIONS=10
    ports:
      - "3000:3000"
    networks: [local-services]

  rsshub:
    image: diygod/rsshub:latest
    container_name: aistock-rsshub
    restart: unless-stopped
    ports:
      - "1200:1200"
    environment:
      - NODE_ENV=production
      - CACHE_TYPE=redis
      - REDIS_URL=redis://redis:6379/
      - PUPPETEER_WS_ENDPOINT=ws://browserless:3000
    depends_on:
      - redis
      - browserless
    networks: [local-services]

volumes:
  postgres_data:
  redis-data:
  mongodb_data:
  # no additional volumes for rsshub/browserless (stateless)

networks:
  local-services:
 